<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Rainbow - O Paraíso dos Bichinhos</title>
    <style>
        :root {
            --lilac-bg: #f3f0ff;    /* Roxo bem clarinho */
            --lilac-soft: #dcd0ff;  /* Lilás pastel */
            --lilac-dark: #8e44ad;
            --yellow: #ffd32a;
            --blue: #34e7e4;
            --pink: #ffaf40;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--lilac-bg);
            color: #444;
            overflow-x: hidden;
        }

        /* Topo e Logo */
        header {
            background: var(--white);
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid var(--lilac-soft);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--lilac-dark);
            text-shadow: 2px 2px var(--lilac-soft);
        }

        /* Banner Principal com Fotos */
        .hero-banner {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 30px 10%;
            background: white;
        }

        .hero-img {
            width: 200px;
            height: 200px
